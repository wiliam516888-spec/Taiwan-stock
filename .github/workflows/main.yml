name: Daily Taiwan Stock Picker

on:
  schedule:
    # 國際標準時間 (UTC) 08:00 等於台灣時間 (CST) 16:00 (下午4點)
    # 每週一到週五執行
    - cron: '0 8 * * 1-5'
  workflow_dispatch: # 讓您可以手動點擊按鈕來測試執行

jobs:
  run-stock-picker:
    runs-on: ubuntu-latest

    steps:
    - name: 檢查程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas

    - name: 執行選股程式並發送 LINE 通知
      env:
        LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
      run: python stock_picker.py

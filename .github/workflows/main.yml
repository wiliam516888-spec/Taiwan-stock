name: Daily Taiwan Stock Picker

on:
  schedule:
    # 台灣時間 (CST) 下午 16:00 執行 (等於國際標準時間 UTC 08:00)
    - cron: '0 8 * * 1-5'
  workflow_dispatch: # 允許手動點擊執行

jobs:
  run-stock-picker:
    runs-on: ubuntu-latest

    steps:
    - name: 檢查程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas urllib3

    - name: 執行選股程式並發送 LINE 通知
      env:
        LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
      # 這裡加入了強制使用 IPv4 的備用網路環境設定，繞過 GitHub 機房的 DNS 錯誤
      run: |
        export GODEBUG=netdns=go
        python stock_picker.py
